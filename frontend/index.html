<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxyFilter 管理台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; margin: 0; padding: 20px; background: #f5f7fa; }
        #app { max-width: 1400px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
        .title-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .hint { color: #909399; font-size: 12px; line-height: 1.6; }
        .mono { font-family: Consolas, Monaco, monospace; }
        .script-box textarea { font-family: Consolas, Monaco, monospace; font-size: 13px; }
        .sub-url { word-break: break-all; font-family: Consolas, Monaco, monospace; font-size: 12px; }
        .rule-tag { margin: 2px; }
        .rule-edit-form .el-form-item { margin-bottom: 10px; }
        .el-table .cell { display: flex; align-items: center; flex-wrap: nowrap; }
        .op-cell .el-button { margin-left: 0 !important; margin-right: 4px; }
        .op-cell .el-button:last-child { margin-right: 0; }
        .el-transfer { display: flex; justify-content: center; }
        .el-transfer-panel { width: 45%; }
        .el-transfer-panel__body { height: 260px; }
        .el-transfer-panel__list { height: 210px; }
    </style>
</head>
<body>
<div id="app">

    <!-- ====== 初始化设置 ====== -->
    <el-dialog title="初始化管理员" :visible.sync="setupVisible" :close-on-click-modal="false" :close-on-press-escape="false" :show-close="false" width="420px">
        <div style="margin-bottom:16px;color:#606266;font-size:14px;">欢迎使用 ProxyFilter！请创建管理员账户。</div>
        <el-form label-width="90px" size="small">
            <el-form-item label="用户名"><el-input v-model="setupForm.username" placeholder="默认 admin"></el-input></el-form-item>
            <el-form-item label="密码" required><el-input v-model="setupForm.password" type="password" placeholder="至少6位" show-password></el-input></el-form-item>
            <el-form-item label="确认密码" required><el-input v-model="setupForm.password2" type="password" placeholder="再次输入" show-password></el-input></el-form-item>
        </el-form>
        <span slot="footer"><el-button type="primary" @click="doSetup">创建并登录</el-button></span>
    </el-dialog>

    <!-- ====== 登录 ====== -->
    <el-dialog title="管理员登录" :visible.sync="loginVisible" :close-on-click-modal="false" :close-on-press-escape="false" :show-close="false" width="380px">
        <el-form @keyup.enter.native="login" label-width="70px" size="small">
            <el-form-item label="用户名"><el-input v-model="loginForm.username" autocomplete="username"></el-input></el-form-item>
            <el-form-item label="密码"><el-input v-model="loginForm.password" type="password" autocomplete="current-password" show-password></el-input></el-form-item>
        </el-form>
        <span slot="footer"><el-button type="primary" @click="login">登录</el-button></span>
    </el-dialog>

    <!-- ====== 修改密码 ====== -->
    <el-dialog title="修改密码" :visible.sync="changePwdVisible" width="420px">
        <el-form label-width="90px" size="small">
            <el-form-item label="旧密码" required><el-input v-model="changePwdForm.old_password" type="password" show-password></el-input></el-form-item>
            <el-form-item label="新密码" required><el-input v-model="changePwdForm.new_password" type="password" placeholder="至少6位" show-password></el-input></el-form-item>
            <el-form-item label="确认密码" required><el-input v-model="changePwdForm.new_password2" type="password" placeholder="再次输入" show-password></el-input></el-form-item>
        </el-form>
        <span slot="footer">
            <el-button @click="changePwdVisible=false">取消</el-button>
            <el-button type="primary" @click="doChangePassword">确认修改</el-button>
        </span>
    </el-dialog>

    <!-- ====== 标题栏 ====== -->
    <div class="title-bar">
        <h1 style="margin:0">
            ProxyFilter
            <span v-if="versionInfo.version" class="hint" style="font-weight:400;margin-left:8px;">v{{ versionInfo.version }}</span>
        </h1>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <el-button @click="fetchAll" :loading="loading" size="small">刷新</el-button>
            <el-button type="warning" @click="$refs.sourceList.refreshSourceCache()" :loading="refreshingSources" size="small" v-if="activeTab==='sources'">全量刷新缓存</el-button>
            <el-button type="success" size="small" @click="$refs.sourceList.openAddSourceDialog()" v-if="activeTab==='sources'">添加订阅源</el-button>
            <el-button type="primary" size="small" @click="$refs.profileList.openProfileDialog()" v-if="activeTab==='profiles'">新建聚合订阅</el-button>
            <el-button size="small" @click="$refs.configIo.exportConfig()" icon="el-icon-download">导出</el-button>
            <el-button size="small" @click="$refs.configIo.openImportDialog()" icon="el-icon-upload2">导入</el-button>
            <el-button size="small" @click="changePwdVisible=true" v-if="authEnabled && !needsSetup">修改密码</el-button>
            <el-button size="small" @click="doLogout" v-if="authEnabled">退出</el-button>
        </div>
    </div>

    <!-- ====== Tab 容器 ====== -->
    <el-tabs v-model="activeTab" @tab-click="onTabChange">
        <el-tab-pane label="订阅源" name="sources">
            <source-list ref="sourceList"></source-list>
        </el-tab-pane>
        <el-tab-pane label="聚合订阅" name="profiles">
            <profile-list ref="profileList"></profile-list>
        </el-tab-pane>
        <el-tab-pane label="分流规则" name="routing">
            <routing-manager ref="routingManager"></routing-manager>
        </el-tab-pane>
    </el-tabs>

    <!-- ====== 配置导入导出（隐藏，通过 $refs 调用） ====== -->
    <config-io ref="configIo"></config-io>

</div>

<!-- CDN -->
<script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<!-- 应用代码（按依赖顺序加载） -->
<script src="api.js"></script>
<script src="components/source-list.js"></script>
<script src="components/profile-list.js"></script>
<script src="components/routing.js"></script>
<script src="components/config-io.js"></script>
<script src="app.js"></script>
</body>
</html>
